<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RefSieve — 文献重複除去ツール</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f3ee;
  --surface: #ffffff;
  --surface2: #f0ede6;
  --border: #ddd8ce;
  --border2: #c8c2b4;
  --text: #1a1814;
  --text2: #6b6456;
  --text3: #9c9385;
  --accent: #2d4a3e;
  --accent2: #4a7c6a;
  --accent-light: #e8f0ed;
  --blue: #1d3f6e;
  --blue-light: #e4ecf7;
  --amber: #7a4e0d;
  --amber-light: #fdf0dc;
  --red: #6e1d1d;
  --red-light: #fae8e8;
  --green: #1d5c2e;
  --green-light: #e4f5e8;
  --mono: 'DM Mono', monospace;
  --sans: 'Noto Sans JP', sans-serif;
  --radius: 8px;
  --radius-lg: 14px;
  /* confidence colors */
  --conf-certain: #1d3f6e;
  --conf-certain-bg: #e4ecf7;
  --conf-likely: #1d5c2e;
  --conf-likely-bg: #e4f5e8;
  --conf-possible: #7a4e0d;
  --conf-possible-bg: #fdf0dc;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}

.page {
  max-width: 820px;
  margin: 0 auto;
  padding: 2.5rem 1.5rem 4rem;
}

header {
  margin-bottom: 2.5rem;
  display: flex;
  align-items: baseline;
  gap: 1rem;
}

.logo {
  font-family: var(--mono);
  font-size: 1.75rem;
  font-weight: 500;
  color: var(--accent);
  letter-spacing: -0.02em;
}

.logo span {
  color: var(--text3);
}

.tagline {
  font-size: 13px;
  color: var(--text3);
  font-family: var(--mono);
}

/* Drop zone */
.dropzone {
  border: 1.5px dashed var(--border2);
  border-radius: var(--radius-lg);
  background: var(--surface);
  padding: 2.5rem 2rem;
  text-align: center;
  cursor: pointer;
  position: relative;
  transition: border-color .15s, background .15s;
}

.dropzone:hover, .dropzone.drag {
  border-color: var(--accent2);
  background: var(--accent-light);
}

.dropzone input[type=file] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
}

.dz-icon {
  display: inline-block;
  width: 48px;
  height: 48px;
  margin-bottom: .75rem;
}

.dz-icon svg { width: 100%; height: 100%; }

.dz-title {
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: .25rem;
}

.dz-sub {
  font-size: 13px;
  color: var(--text3);
}

/* File tags */
.file-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 1rem;
}

.file-tag {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 5px 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 13px;
  font-family: var(--mono);
  color: var(--text);
  animation: fadeIn .15s ease;
}

@keyframes fadeIn { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:translateY(0)} }

.src-badge {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 500;
  letter-spacing: .03em;
  font-family: var(--mono);
}

.src-pubmed  { background: var(--blue-light);  color: var(--blue); }
.src-scopus  { background: var(--green-light); color: var(--green); }
.src-cochrane{ background: var(--amber-light); color: var(--amber); }
.src-unknown { background: var(--surface2);    color: var(--text2); }

.file-tag button {
  background: none; border: none; cursor: pointer;
  color: var(--text3); font-size: 15px; line-height: 1;
  padding: 0 0 0 2px; transition: color .1s;
}
.file-tag button:hover { color: var(--red); }

/* Options */
.options-panel {
  display: flex;
  gap: 0;
  margin-top: 1rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--surface);
}

.opt {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: .6rem .9rem;
  cursor: pointer;
  border-right: 1px solid var(--border);
  transition: background .1s;
  font-size: 13px;
  color: var(--text2);
  user-select: none;
}

.opt:last-child { border-right: none; }
.opt:hover { background: var(--surface2); }
.opt input[type=checkbox] { width: 14px; height: 14px; accent-color: var(--accent); cursor: pointer; }
.opt.active { color: var(--text); background: var(--accent-light); }
.opt .opt-tag {
  font-family: var(--mono);
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 3px;
  background: var(--surface2);
  color: var(--text3);
  margin-left: auto;
}

/* Run button */
.btn-run {
  width: 100%;
  margin-top: 1.25rem;
  padding: .85rem;
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: .05em;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background .12s, transform .08s;
}

.btn-run:hover:not(:disabled) { background: #1e3328; }
.btn-run:active:not(:disabled) { transform: scale(.99); }
.btn-run:disabled { opacity: .35; cursor: not-allowed; }

/* Progress */
.progress {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  margin-top: .75rem;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  width: 0;
  background: var(--accent2);
  transition: width .25s ease;
}

/* Results */
#results { margin-top: 2rem; display: none; }

.divider {
  height: 1px;
  background: var(--border);
  margin: 1.75rem 0;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.1rem 1.25rem;
}

.stat-label {
  font-size: 12px;
  font-family: var(--mono);
  color: var(--text3);
  margin-bottom: .5rem;
  letter-spacing: .04em;
}

.stat-val {
  font-family: var(--mono);
  font-size: 2.2rem;
  font-weight: 500;
  color: var(--text);
  line-height: 1;
}

.stat-val.c-blue  { color: var(--blue); }
.stat-val.c-green { color: var(--green); }

.stat-sub {
  font-size: 12px;
  color: var(--text3);
  margin-top: .3rem;
}

/* Section header */
.sec-head {
  display: flex;
  align-items: center;
  gap: .5rem;
  margin-bottom: 1rem;
}

.sec-label {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: .08em;
  color: var(--text3);
  text-transform: uppercase;
}

.sec-count {
  font-family: var(--mono);
  font-size: 12px;
  padding: 1px 7px;
  border-radius: 4px;
  background: var(--surface2);
  color: var(--text2);
}

/* Dup groups */
.dup-group {
  margin-bottom: 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.dup-item {
  padding: .7rem 1rem;
  font-size: 13px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

.dup-item:last-child { border-bottom: none; }
.dup-item.is-kept { background: var(--accent-light); }
.dup-item.is-dup  { background: var(--surface2); }

.dup-row { display: flex; align-items: flex-start; gap: 10px; }

.dup-title {
  flex: 1;
  color: var(--text);
  font-size: 13px;
  font-weight: 500;
  line-height: 1.4;
}

.dup-item.is-dup .dup-title {
  color: var(--text2);
  text-decoration: line-through;
  text-decoration-color: var(--border2);
}

.match-badge {
  font-family: var(--mono);
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 4px;
  white-space: nowrap;
  flex-shrink: 0;
}
.mb-kept   { background: var(--accent-light); color: var(--accent); }
.mb-doi    { background: var(--blue-light); color: var(--blue); }
.mb-title  { background: var(--green-light); color: var(--green); }
.mb-fuzzy  { background: var(--amber-light); color: var(--amber); }

.dup-meta {
  font-size: 11px;
  color: var(--text3);
  margin-top: 4px;
  font-family: var(--mono);
}

.empty {
  padding: 2rem;
  text-align: center;
  color: var(--text3);
  font-size: 14px;
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  font-family: var(--mono);
}

/* Download buttons */
.dl-grid {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.btn-dl {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: .6rem 1rem;
  font-family: var(--mono);
  font-size: 13px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  color: var(--text);
  transition: border-color .1s, background .1s;
}

.btn-dl:hover { border-color: var(--accent2); background: var(--accent-light); color: var(--accent); }

.btn-dl svg { width: 14px; height: 14px; flex-shrink: 0; }

/* File source breakdown */
.breakdown {
  margin-top: .75rem;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.bk-item {
  font-size: 12px;
  font-family: var(--mono);
  color: var(--text2);
}

footer {
  margin-top: 3rem;
  text-align: center;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text3);
}

/* Floating nav */
.fab {
  position: fixed;
  right: 1.5rem;
  bottom: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.fab.visible { opacity: 1; pointer-events: auto; }
.fab-btn {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  border: none;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 3px 10px rgba(0,0,0,.18);
  transition: background .12s, transform .1s;
  font-family: var(--mono);
  position: relative;
}
.fab-btn:hover { background: #1e3328; transform: scale(1.07); }
.fab-btn .fab-tip {
  position: absolute;
  right: 50px;
  background: rgba(26,24,20,.82);
  color: #fff;
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 5px;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity .12s;
}
.fab-btn:hover .fab-tip { opacity: 1; }

/* Confidence badges */
.conf-badge {
  font-family: var(--mono);
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 4px;
  white-space: nowrap;
  flex-shrink: 0;
  font-weight: 500;
}
.conf-certain  { background: var(--conf-certain-bg);  color: var(--conf-certain); }
.conf-likely   { background: var(--conf-likely-bg);   color: var(--conf-likely); }
.conf-possible { background: var(--conf-possible-bg); color: var(--conf-possible); }

/* Group confidence header */
.grp-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: .45rem .9rem;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  font-family: var(--mono);
  color: var(--text3);
}
.grp-num { color: var(--text3); margin-right: 2px; }

/* Confidence filter bar */
.conf-filter {
  display: flex;
  gap: 8px;
  margin-bottom: 1rem;
  flex-wrap: wrap;
  align-items: center;
}
.cf-label { font-size: 11px; font-family: var(--mono); color: var(--text3); margin-right: 2px; }
.cf-btn {
  padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  font-size: 12px;
  font-family: var(--mono);
  cursor: pointer;
  color: var(--text2);
  transition: all .12s;
}
.cf-btn:hover { border-color: var(--border2); }
.cf-btn.active { border-color: transparent; }
.cf-btn[data-cf="all"].active { background: var(--accent); color: #fff; border-color: var(--accent); }
.cf-btn[data-cf="certain"].active  { background: var(--conf-certain-bg); color: var(--conf-certain); border-color: var(--conf-certain); }
.cf-btn[data-cf="likely"].active   { background: var(--conf-likely-bg);  color: var(--conf-likely);  border-color: var(--conf-likely); }
.cf-btn[data-cf="possible"].active { background: var(--conf-possible-bg);color: var(--conf-possible);border-color: var(--conf-possible); }
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="logo">Ref<span>Sieve</span></div>
    <div class="tagline">// 文献重複除去ツール</div>
  </header>

  <div class="dropzone" id="dropzone">
    <input type="file" id="fileInput" multiple accept=".ris,.txt">
    <div class="dz-icon">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="6" y="10" width="28" height="34" rx="3" fill="#e8f0ed" stroke="#4a7c6a" stroke-width="1.5"/>
        <rect x="14" y="6" width="28" height="34" rx="3" fill="#f5f3ee" stroke="#c8c2b4" stroke-width="1.5"/>
        <line x1="20" y1="18" x2="36" y2="18" stroke="#9c9385" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="20" y1="24" x2="36" y2="24" stroke="#9c9385" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="20" y1="30" x2="30" y2="30" stroke="#9c9385" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="dz-title">RIS・TXTファイルをドロップ、またはクリックして選択</div>
    <div class="dz-sub">PubMed / Scopus / Cochrane のエクスポートファイルに対応</div>
  </div>

  <div class="file-list" id="fileList"></div>

  <div class="options-panel" style="margin-top:1rem">
    <label class="opt active" id="lDoi">
      <input type="checkbox" id="optDoi" checked>
      DOI照合
      <span class="opt-tag">推奨</span>
    </label>
    <label class="opt active" id="lTitle">
      <input type="checkbox" id="optTitle" checked>
      タイトル正規化
    </label>
    <label class="opt" id="lFuzzy">
      <input type="checkbox" id="optFuzzy">
      あいまい照合
      <span class="opt-tag">β</span>
    </label>
  </div>

  <button class="btn-run" id="runBtn" disabled>▶ 重複を検出する</button>
  <div class="progress"><div class="progress-bar" id="progBar"></div></div>

  <div id="results">
    <div class="divider"></div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">取り込み合計</div>
        <div class="stat-val" id="statTotal">0</div>
        <div class="stat-sub" id="statBreak"></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">重複数</div>
        <div class="stat-val c-blue" id="statDup">0</div>
        <div class="stat-sub" id="statDupSub"></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">重複除去後</div>
        <div class="stat-val c-green" id="statDedup">0</div>
        <div class="stat-sub" id="statDedupPct"></div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="sec-head">
      <span class="sec-label">重複グループ</span>
      <span class="sec-count" id="grpCount">0グループ</span>
    </div>
    <div class="conf-filter" id="confFilter">
      <span class="cf-label">絞り込み：</span>
      <button class="cf-btn active" data-cf="all">すべて</button>
      <button class="cf-btn" data-cf="certain">🔵 確実</button>
      <button class="cf-btn" data-cf="likely">🟢 ほぼ確実</button>
      <button class="cf-btn" data-cf="possible">🟡 可能性</button>
    </div>
    <div id="dupList"><div class="empty">重複は検出されませんでした</div></div>

    <div class="divider"></div>

    <div class="sec-head">
      <span class="sec-label">ダウンロード</span>
    </div>
    <div class="dl-grid">
      <button class="btn-dl" id="dlRis">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 2v8M5 7l3 3 3-3M3 13h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        deduplicated.ris
      </button>
      <button class="btn-dl" id="dlTsv">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 2v8M5 7l3 3 3-3M3 13h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        deduplicated.tsv
      </button>
      <button class="btn-dl" id="dlReport">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 2v8M5 7l3 3 3-3M3 13h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        dedup_report.txt
      </button>
    </div>
  </div>

  <footer>RefSieve v2.0 &nbsp;—&nbsp; ローカル処理のみ・データは外部送信されません</footer>
</div>

<!-- Floating navigation buttons -->
<div class="fab" id="fab">
  <button class="fab-btn" id="fabTop" title="ページ先頭へ">
    ↑<span class="fab-tip">先頭へ</span>
  </button>
  <button class="fab-btn" id="fabPrev" title="前のグループ">
    ‹<span class="fab-tip">前のグループ</span>
  </button>
  <button class="fab-btn" id="fabNext" title="次のグループ">
    ›<span class="fab-tip">次のグループ</span>
  </button>
</div>

<script>
const state = { files: [], records: [], dupGroups: [], dedupRecords: [] };

const $ = id => document.getElementById(id);
const dz = $('dropzone'), fi = $('fileInput'), fl = $('fileList');

fi.addEventListener('change', e => addFiles([...e.target.files]));
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag'); addFiles([...e.dataTransfer.files]); });

['optDoi','optTitle','optFuzzy'].forEach(id => {
  $(id).addEventListener('change', function() {
    const label = this.closest('label');
    label.classList.toggle('active', this.checked);
  });
});

function addFiles(newFiles) {
  newFiles.forEach(f => {
    if (!state.files.find(x => x.name === f.name && x.size === f.size)) state.files.push(f);
  });
  renderFileList();
  $('runBtn').disabled = state.files.length === 0;
}

function removeFile(idx) {
  state.files.splice(idx, 1);
  renderFileList();
  $('runBtn').disabled = state.files.length === 0;
}

function detectSource(filename, content) {
  const fn = filename.toLowerCase();
  if (fn.includes('pubmed') || fn.includes('medline')) return 'pubmed';
  if (fn.includes('scopus')) return 'scopus';
  if (fn.includes('cochrane') || fn.includes('cdsr')) return 'cochrane';
  if (content.includes('Provider: Elsevier') || content.includes('DB  - Scopus')) return 'scopus';
  if (content.includes('PMID-') || content.includes('JID - ')) return 'pubmed';
  if (content.includes('Cochrane') || content.includes('CDSR')) return 'cochrane';
  return 'unknown';
}

function renderFileList() {
  fl.innerHTML = '';
  state.files.forEach((f, i) => {
    const tag = document.createElement('div');
    tag.className = 'file-tag';
    const src = f._src || 'unknown';
    tag.innerHTML = `<span class="src-badge src-${src}">${src.toUpperCase()}</span>${escHtml(f.name)}<button onclick="removeFile(${i})" title="削除">×</button>`;
    fl.appendChild(tag);
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function normalizeLineEndings(text) {
  // \r\n → \n、単独 \r → \n に統一（最重要：PubMed TXTはCRLF）
  return text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
}

function parseRIS(text, source, filename) {
  text = normalizeLineEndings(text);
  const records = [];
  // ERで分割（ER  - または ER- の行）
  const entries = text.split(/\nER\s*-[^\n]*/);
  entries.forEach(entry => {
    if (!entry.includes('TY  -') && !entry.includes('TY  - ')) return;
    const rec = { _source: source, _file: filename, _raw: entry.trimEnd() + '\nER  - \n\n' };
    const lines = entry.split('\n');
    let lastTag = null;
    lines.forEach(line => {
      const m = line.match(/^([A-Z][A-Z0-9])\s+-\s*(.*)/);
      if (m) {
        lastTag = m[1];
        if (!rec[lastTag]) rec[lastTag] = [];
        rec[lastTag].push(m[2].trim());
      } else if (lastTag && /^\s+\S/.test(line)) {
        rec[lastTag][rec[lastTag].length - 1] += ' ' + line.trim();
      }
    });
    const doi = extractDoiFromRIS(rec);
    const title = extractTitleFromRIS(rec);
    if (doi || title) records.push({ ...rec, _doi: doi, _title: title, _normTitle: normalizeTitle(title), _authorYear: extractAuthorYearRIS(rec) });
  });
  return records;
}

function parsePubMedTxt(text, source, filename) {
  // \r\n を \n に正規化してから処理（これが最大のバグ修正点）
  text = normalizeLineEndings(text);
  const records = [];
  // 空行（\n\n）で分割してPMIDで始まるブロックのみ処理
  const chunks = text.split(/\n{2,}/);
  chunks.forEach(chunk => {
    if (!chunk.startsWith('PMID')) return;
    const rec = { _source: source, _file: filename, _raw: chunk };
    const lines = chunk.split('\n');
    let lastTag = null;
    lines.forEach(line => {
      const m = line.match(/^([A-Z]+)\s+-\s+(.*)/);
      if (m) {
        lastTag = m[1];
        if (!rec[lastTag]) rec[lastTag] = [];
        rec[lastTag].push(m[2].trim());
      } else if (lastTag && line.startsWith('      ')) {
        rec[lastTag][rec[lastTag].length - 1] += ' ' + line.trim();
      }
    });
    const doi = extractDoiPubMed(rec);
    const title = (rec['TI'] || []).join(' ');
    if (title) records.push({ ...rec, _doi: doi, _title: title, _normTitle: normalizeTitle(title), _authorYear: extractAuthorYearPubMed(rec) });
  });
  return records;
}

function extractDoiFromRIS(rec) {
  // まずDO/DOIフィールドを優先
  for (const f of ['DO', 'DOI']) {
    if (rec[f]) for (const v of rec[f]) {
      const m = v.match(/10\.\d{4,}\/[^\s\[]+/i);
      if (m) return m[0].replace(/[.,;>\]]+$/, '').toLowerCase();
    }
  }
  // フォールバック：URL等からDOIを抽出
  for (const f of ['UR', 'N1', 'M3', 'L3', 'AN']) {
    if (rec[f]) for (const v of rec[f]) {
      const m = v.match(/10\.\d{4,}\/[^\s\[]+/i);
      if (m) return m[0].replace(/[.,;>\]]+$/, '').toLowerCase();
    }
  }
  return null;
}

function extractDoiPubMed(rec) {
  // LIDフィールド: "10.xxxx/yyy [doi]" 形式
  for (const f of ['LID', 'AID']) {
    if (rec[f]) for (const v of rec[f]) {
      // [doi] タグがある行のみDOIとして扱う
      if (/\[doi\]/i.test(v)) {
        const m = v.match(/10\.\d{4,}\/[^\s\[]+/i);
        if (m) return m[0].replace(/[.,;>\]]+$/, '').toLowerCase();
      }
    }
  }
  return null;
}

function extractTitleFromRIS(rec) {
  return (rec['TI'] || rec['T1'] || []).join(' ');
}

function normalizeTitle(t) {
  if (!t) return '';
  return t.toLowerCase()
    .replace(/[\u2018\u2019\u201c\u201d\u2010\u2011\u2012\u2013\u2014]/g, ' ')
    .replace(/[^a-z0-9\u3040-\u30ff\u4e00-\u9fff\uac00-\ud7af ]/g, ' ')
    .replace(/\s+/g, ' ').trim();
}

function doiSimilar(a, b) {
  // 同じ出版社プレフィックス (10.xxxx) かつ編集距離≤3 → 同一論文の別バージョン/タイポ
  if (!a || !b) return false;
  if (a.split('/')[0] !== b.split('/')[0]) return false;
  if (Math.abs(a.length - b.length) > 5) return false;
  const m = a.length, n = b.length;
  let dp = Array.from({length: n + 1}, (_, i) => i);
  for (let i = 1; i <= m; i++) {
    const ndp = [i];
    for (let j = 1; j <= n; j++)
      ndp[j] = a[i-1] === b[j-1] ? dp[j-1] : 1 + Math.min(dp[j], ndp[j-1], dp[j-1]);
    dp = ndp;
  }
  return dp[n] <= 3;
}

function extractAuthorYearRIS(rec) {
  const au = (rec['AU'] || rec['A1'] || [])[0] || '';
  const yr = (rec['PY'] || rec['Y1'] || rec['DA'] || [])[0] || '';
  return (au.split(',')[0].toLowerCase() + yr.slice(0, 4)).trim();
}

function extractAuthorYearPubMed(rec) {
  const au = (rec['AU'] || [])[0] || '';
  const yr = (rec['DP'] || [])[0] || '';
  return (au.split(' ')[0].toLowerCase() + yr.slice(0, 4)).trim();
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, (_, i) =>
    Array.from({ length: n + 1 }, (_, j) => i === 0 ? j : j === 0 ? i : 0)
  );
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i - 1] === b[j - 1] ? dp[i - 1][j - 1] : 1 + Math.min(dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1]);
  return dp[m][n];
}

function similarity(a, b) {
  if (!a || !b) return 0;
  const max = Math.max(a.length, b.length);
  return max === 0 ? 1 : 1 - levenshtein(a, b) / max;
}

async function readFile(f) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = rej;
    r.readAsText(f, 'UTF-8');
  });
}

// --- 確信度の算出 ---
// グループの照合種別から確信度ランクを返す
// certain: DOI完全一致が1件以上含まれる
// likely: タイトル正規化一致のみ（DOIなし or 片方のみ）
// possible: あいまい照合のみ
function calcConfidence(grp) {
  const types = grp.slice(1).map(x => x.matchType);
  if (types.includes('doi')) return 'certain';
  if (types.includes('title')) return 'likely';
  return 'possible';
}

// 確信度の表示設定
const CONF_INFO = {
  certain:  { label: '確実',     cls: 'conf-certain',  icon: '🔵' },
  likely:   { label: 'ほぼ確実', cls: 'conf-likely',   icon: '🟢' },
  possible: { label: '可能性',   cls: 'conf-possible',  icon: '🟡' },
};

// グループリストを描画（フィルター対応）
let activeFilter = 'all';
function renderGroups() {
  const groups = state.dupGroups;
  const dl = $('dupList');
  if (groups.length === 0) {
    dl.innerHTML = '<div class="empty">重複は検出されませんでした</div>';
    return;
  }
  dl.innerHTML = '';
  let shown = 0;
  groups.forEach((grp, gi) => {
    const cf = calcConfidence(grp);
    if (activeFilter !== 'all' && cf !== activeFilter) return;
    shown++;
    const div = document.createElement('div');
    div.className = 'dup-group';
    div.dataset.cf = cf;
    div.id = 'grp-' + gi;

    // グループヘッダー（確信度 + グループ番号）
    const cfInfo = CONF_INFO[cf];
    const hdr = document.createElement('div');
    hdr.className = 'grp-header';
    hdr.innerHTML = `<span class="grp-num">#${gi + 1}</span><span class="conf-badge ${cfInfo.cls}">${cfInfo.icon} ${cfInfo.label}</span>`;
    div.appendChild(hdr);

    grp.forEach(({ idx, matchType }) => {
      const r = state.records[idx];
      const isKept = matchType === 'kept';
      const label = isKept ? '保持' : matchType === 'doi' ? 'DOI一致' : matchType === 'fuzzy' ? 'あいまい' : 'タイトル一致';
      const cls = isKept ? 'mb-kept' : matchType === 'doi' ? 'mb-doi' : matchType === 'fuzzy' ? 'mb-fuzzy' : 'mb-title';
      const item = document.createElement('div');
      item.className = 'dup-item ' + (isKept ? 'is-kept' : 'is-dup');
      item.innerHTML = `<div class="dup-row"><span class="dup-title">${escHtml(r._title || '(タイトル不明)')}</span><span class="match-badge ${cls}">${label}</span></div><div class="dup-meta">${r._source.toUpperCase()} &nbsp;·&nbsp; ${escHtml(r._file)}${r._doi ? ' &nbsp;·&nbsp; ' + escHtml(r._doi) : ''}</div>`;
      div.appendChild(item);
    });
    dl.appendChild(div);
  });
  if (shown === 0) {
    dl.innerHTML = '<div class="empty">該当するグループがありません</div>';
  }
}

// 確信度フィルターボタン
document.querySelectorAll('.cf-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cf-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.cf;
    renderGroups();
  });
});

$('runBtn').addEventListener('click', async () => {
  $('runBtn').disabled = true;
  $('results').style.display = 'none';
  const pb = $('progBar');
  pb.style.width = '5%';
  state.records = [];

  for (let i = 0; i < state.files.length; i++) {
    const f = state.files[i];
    pb.style.width = Math.round(10 + 55 * (i / state.files.length)) + '%';
    const rawText = await readFile(f);
    const text = normalizeLineEndings(rawText);
    const src = detectSource(f.name, text);
    f._src = src;
    let recs = [];
    const fnLower = f.name.toLowerCase();
    if (fnLower.endsWith('.ris')) {
      recs = parseRIS(text, src, f.name);
    } else {
      recs = /^PMID-/m.test(text) ? parsePubMedTxt(text, src, f.name) : parseRIS(text, src, f.name);
    }
    state.records.push(...recs);
  }
  renderFileList();
  pb.style.width = '68%';

  const useDoi = $('optDoi').checked;
  const useTitle = $('optTitle').checked;
  const useFuzzy = $('optFuzzy').checked;

  const groups = [];
  const assigned = new Set();

  // --- Phase 1: DOI照合（完全一致） ---
  if (useDoi) {
    const doiMap = new Map();
    state.records.forEach((rec, i) => {
      if (!rec._doi) return;
      if (!doiMap.has(rec._doi)) doiMap.set(rec._doi, []);
      doiMap.get(rec._doi).push(i);
    });
    doiMap.forEach(idxs => {
      if (idxs.length < 2) return;
      const grp = idxs.map((idx, pos) => ({ idx, matchType: pos === 0 ? 'kept' : 'doi' }));
      idxs.forEach(i => assigned.add(i));
      groups.push(grp);
    });
  }

  // --- Phase 2: タイトル正規化照合（未割り当てのみ） ---
  // ① 正規化タイトル長8字未満はスキップ（極端に短いフレーズの誤マッチ防止）
  // ② 両方にDOIがあり異なる場合は別論文（doiSimilarで類似DOIのみ例外）
  // ③ 著者年チェックは行わない：Scopus登録年ズレ（2020/2021など）で
  //    同一論文を誤除外するケースが多く、精度が低下するため削除
  if (useTitle) {
    const titleMap = new Map();
    state.records.forEach((rec, i) => {
      if (assigned.has(i)) return;
      const nt = rec._normTitle;
      if (!nt || nt.length < 8) return;
      if (!titleMap.has(nt)) titleMap.set(nt, []);
      titleMap.get(nt).push(i);
    });
    titleMap.forEach(idxs => {
      if (idxs.length < 2) return;
      const keepGroup = [{ idx: idxs[0], matchType: 'kept' }];
      assigned.add(idxs[0]);
      for (let ji = 1; ji < idxs.length; ji++) {
        const j = idxs[ji];
        const rj = state.records[j];
        let isDup = false;
        for (const kept of keepGroup) {
          const rk = state.records[kept.idx];
          const dj = rj._doi, dk = rk._doi;
          if (dj && dk && dj !== dk) {
            // 両方DOIがあって異なる：類似DOI（タイポ・別バージョン）のみ同一とみなす
            isDup = doiSimilar(dj, dk);
          } else {
            isDup = true;
          }
          if (isDup) break;
        }
        if (isDup) {
          keepGroup.push({ idx: j, matchType: 'title' });
          assigned.add(j);
        }
      }
      if (keepGroup.length > 1) groups.push(keepGroup);
    });
  }

  // --- Phase 3: あいまい照合（著者+年+タイトル類似度、未割り当てのみ） ---
  // 条件：著者年（第一著者姓+出版年）が完全一致 かつ タイトル類似度85%超
  // ※ DOIが両方あって明確に異なる場合のみ除外（doiSimilarで類似DOIは許容）
  if (useFuzzy) {
    const remaining = state.records.map((_, i) => i).filter(i => !assigned.has(i));
    remaining.forEach((i, ai) => {
      if (assigned.has(i)) return;
      const rec = state.records[i];
      if (!rec._authorYear || rec._authorYear.length < 4) return;
      if (!rec._normTitle || rec._normTitle.length < 15) return;
      const grp = [{ idx: i, matchType: 'kept' }];
      assigned.add(i);
      remaining.slice(ai + 1).forEach(j => {
        if (assigned.has(j)) return;
        const other = state.records[j];
        if (rec._authorYear !== other._authorYear) return;
        if (!other._normTitle || other._normTitle.length < 15) return;
        if (rec._doi && other._doi && rec._doi !== other._doi && !doiSimilar(rec._doi, other._doi)) return;
        if (similarity(rec._normTitle, other._normTitle) > 0.85) {
          grp.push({ idx: j, matchType: 'fuzzy' });
          assigned.add(j);
        }
      });
      if (grp.length > 1) groups.push(grp);
    });
  }

  pb.style.width = '90%';
  state.dupGroups = groups;

  const dupIndices = new Set();
  groups.forEach(g => g.slice(1).forEach(x => dupIndices.add(x.idx)));
  state.dedupRecords = state.records.filter((_, i) => !dupIndices.has(i));

  const total = state.records.length;
  const dupCount = dupIndices.size;
  const dedupCount = state.dedupRecords.length;

  $('statTotal').textContent = total;
  $('statDup').textContent = dupCount;
  $('statDedup').textContent = dedupCount;

  const srcCounts = {};
  state.records.forEach(r => { srcCounts[r._source] = (srcCounts[r._source] || 0) + 1; });
  $('statBreak').textContent = Object.entries(srcCounts).map(([k, v]) => k.toUpperCase() + ' ' + v).join(' / ');

  // 確信度別件数
  const cfCounts = { certain: 0, likely: 0, possible: 0 };
  groups.forEach(g => { cfCounts[calcConfidence(g)]++; });
  $('statDupSub').textContent = `${groups.length} グループ（確実 ${cfCounts.certain} / ほぼ確実 ${cfCounts.likely} / 可能性 ${cfCounts.possible}）`;
  $('statDedupPct').textContent = total > 0 ? Math.round((dedupCount / total) * 100) + '% 残存' : '';
  $('grpCount').textContent = groups.length + ' グループ';

  // フィルターをリセット
  activeFilter = 'all';
  document.querySelectorAll('.cf-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.cf-btn[data-cf="all"]').classList.add('active');

  renderGroups();

  pb.style.width = '100%';
  setTimeout(() => { pb.style.width = '0'; }, 700);
  $('results').style.display = 'block';
  $('runBtn').disabled = false;
  $('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
});

// --- フローティングナビゲーション ---
const fab = $('fab');
window.addEventListener('scroll', () => {
  fab.classList.toggle('visible', window.scrollY > 300);
});
$('fabTop').addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

function getVisibleGroups() {
  return [...document.querySelectorAll('#dupList .dup-group')];
}
function scrollToGroup(el) {
  el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

$('fabNext').addEventListener('click', () => {
  const gs = getVisibleGroups();
  if (!gs.length) return;
  const scrollY = window.scrollY + 120;
  const next = gs.find(g => g.getBoundingClientRect().top + window.scrollY > scrollY);
  scrollToGroup(next || gs[gs.length - 1]);
});
$('fabPrev').addEventListener('click', () => {
  const gs = getVisibleGroups();
  if (!gs.length) return;
  const scrollY = window.scrollY + 80;
  const rev = [...gs].reverse();
  const prev = rev.find(g => g.getBoundingClientRect().top + window.scrollY < scrollY - 10);
  scrollToGroup(prev || gs[0]);
});

// --- 出力関数 ---
function toRIS(records) {
  return records.map(r => {
    if (r._raw) return r._raw.trim() + '\n\n';
    return 'TY  - JOUR\n' + (r._doi ? 'DO  - ' + r._doi + '\n' : '') + 'TI  - ' + (r._title || '') + '\nER  - \n\n';
  }).join('');
}

function toTSV(records) {
  const bom = '\uFEFF';
  const header = 'Title\tDOI\tSource\tFile\tAuthors\tYear\n';
  const rows = records.map(r => {
    const au = (r['AU'] || r['A1'] || r['FAU'] || []).join('; ');
    const yr = (r['PY'] || r['Y1'] || r['DA'] || r['DP'] || [])[0] || '';
    return [r._title || '', r._doi || '', r._source, r._file, au, yr]
      .map(v => '"' + String(v).replace(/"/g, '""') + '"').join('\t');
  });
  return bom + header + rows.join('\n');
}

function toReport() {
  const now = new Date().toLocaleString('ja-JP');
  const lines = [
    '=== RefSieve 重複検出レポート ===',
    '生成日時: ' + now,
    '',
    '■ サマリー',
    '  取り込み合計 : ' + state.records.length + ' 件',
    '  重複数       : ' + (state.records.length - state.dedupRecords.length) + ' 件',
    '  重複除去後   : ' + state.dedupRecords.length + ' 件',
    '',
    '■ ファイル別件数',
  ];
  const fc = {};
  state.files.forEach(f => { fc[f.name] = state.records.filter(r => r._file === f.name).length; });
  Object.entries(fc).forEach(([n, c]) => lines.push('  ' + n + ' : ' + c + ' 件 (' + (state.records.find(r => r._file === n) || { _source: 'unknown' })._source.toUpperCase() + ')'));
  lines.push('');
  lines.push('■ 照合方法別・確信度別内訳');
  const mt = { doi: 0, title: 0, fuzzy: 0 };
  const cf = { certain: 0, likely: 0, possible: 0 };
  state.dupGroups.forEach(g => {
    g.slice(1).forEach(x => { mt[x.matchType] = (mt[x.matchType] || 0) + 1; });
    cf[calcConfidence(g)]++;
  });
  lines.push('  DOI照合（確実）       : ' + (mt.doi || 0) + ' 件 → ' + cf.certain + ' グループ');
  lines.push('  タイトル正規化（ほぼ確実）: ' + (mt.title || 0) + ' 件 → ' + cf.likely + ' グループ');
  lines.push('  あいまい照合（可能性）  : ' + (mt.fuzzy || 0) + ' 件 → ' + cf.possible + ' グループ');
  lines.push('');
  lines.push('■ 重複グループ詳細 (' + state.dupGroups.length + ' グループ)');
  state.dupGroups.forEach((grp, i) => {
    const confidence = CONF_INFO[calcConfidence(grp)].label;
    lines.push('\n[グループ ' + (i + 1) + '] 確信度: ' + confidence);
    grp.forEach(({ idx, matchType }) => {
      const r = state.records[idx];
      const prefix = matchType === 'kept' ? '  [保持] ' : '  [除外:' + matchType + '] ';
      lines.push(prefix + (r._title || '(タイトル不明)'));
      lines.push('         ' + r._file + ' (' + r._source + ')' + (r._doi ? ' | ' + r._doi : ''));
    });
  });
  return lines.join('\n');
}

function dlFile(content, filename, type) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type }));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

$('dlRis').addEventListener('click', () => dlFile(toRIS(state.dedupRecords), 'deduplicated.ris', 'application/x-research-info-systems'));
$('dlTsv').addEventListener('click', () => dlFile(toTSV(state.dedupRecords), 'deduplicated.tsv', 'text/tab-separated-values'));
$('dlReport').addEventListener('click', () => dlFile(toReport(), 'dedup_report.txt', 'text/plain;charset=utf-8'));
</script>
